<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bolão Copa 2026 — CLR</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --verde: #00a550;
    --amarelo: #ffd700;
    --azul: #003087;
    --preto: #0a0a0a;
    --cinza-escuro: #141414;
    --cinza-medio: #1e1e1e;
    --cinza-borda: #2a2a2a;
    --texto: #e8e8e8;
    --texto-fraco: #666;
    --fonte-display: 'Bebas Neue', sans-serif;
    --fonte-mono: 'IBM Plex Mono', monospace;
    --fonte-corpo: 'IBM Plex Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--preto);
    color: var(--texto);
    font-family: var(--fonte-corpo);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── LOGIN ── */
  #tela-login {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: var(--preto);
    position: relative;
    overflow: hidden;
  }

  #tela-login::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 50% at 50% -10%, rgba(0,165,80,0.18) 0%, transparent 70%),
      radial-gradient(ellipse 60% 40% at 80% 110%, rgba(0,48,135,0.2) 0%, transparent 60%);
    pointer-events: none;
  }

  .login-logo {
    font-family: var(--fonte-display);
    font-size: clamp(2.5rem, 8vw, 5rem);
    letter-spacing: 0.04em;
    line-height: 1;
    text-align: center;
    margin-bottom: 0.2em;
  }
  .login-logo span.verde { color: var(--verde); }
  .login-logo span.amarelo { color: var(--amarelo); }

  .login-sub {
    font-family: var(--fonte-mono);
    font-size: 0.75rem;
    color: var(--texto-fraco);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 2.5rem;
    text-align: center;
  }

  .login-box {
    background: var(--cinza-medio);
    border: 1px solid var(--cinza-borda);
    border-radius: 12px;
    padding: 2rem;
    width: min(340px, 92vw);
    position: relative;
    z-index: 1;
  }

  .login-instrucao {
    font-family: var(--fonte-mono);
    font-size: 0.7rem;
    color: var(--texto-fraco);
    text-align: center;
    margin-bottom: 1.2rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .pin-display {
    background: var(--cinza-escuro);
    border: 1px solid var(--cinza-borda);
    border-radius: 8px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-bottom: 1.2rem;
  }

  .pin-dot {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    border: 2px solid var(--cinza-borda);
    transition: all 0.15s;
  }
  .pin-dot.ativo {
    background: var(--verde);
    border-color: var(--verde);
    box-shadow: 0 0 8px rgba(0,165,80,0.5);
  }

  .teclado {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }

  .tecla {
    background: var(--cinza-escuro);
    border: 1px solid var(--cinza-borda);
    border-radius: 8px;
    height: 52px;
    font-family: var(--fonte-display);
    font-size: 1.6rem;
    color: var(--texto);
    cursor: pointer;
    transition: all 0.1s;
    display: flex;
    align-items: center;
    justify-content: center;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .tecla:active, .tecla.pressed {
    background: var(--verde);
    border-color: var(--verde);
    color: white;
    transform: scale(0.95);
  }
  .tecla.apagar {
    font-size: 1.2rem;
    color: var(--texto-fraco);
  }
  .tecla.zero { grid-column: 2; }

  #campo-id {
    width: 100%;
    background: var(--cinza-escuro);
    border: 1px solid var(--cinza-borda);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--texto);
    font-family: var(--fonte-mono);
    font-size: 0.85rem;
    margin-bottom: 1rem;
    outline: none;
  }
  #campo-id::placeholder { color: var(--texto-fraco); }
  #campo-id:focus { border-color: var(--verde); }

  .btn-login {
    width: 100%;
    background: var(--verde);
    color: white;
    border: none;
    border-radius: 8px;
    height: 48px;
    font-family: var(--fonte-display);
    font-size: 1.3rem;
    letter-spacing: 0.08em;
    cursor: pointer;
    margin-top: 1rem;
    transition: all 0.15s;
  }
  .btn-login:hover { background: #00c060; }
  .btn-login:active { transform: scale(0.98); }

  .login-erro {
    color: #ff4444;
    font-family: var(--fonte-mono);
    font-size: 0.72rem;
    text-align: center;
    margin-top: 0.8rem;
    min-height: 1em;
  }

  /* ── APP PRINCIPAL ── */
  #app { display: none; flex-direction: column; min-height: 100vh; }

  /* Header */
  .header {
    background: var(--cinza-escuro);
    border-bottom: 1px solid var(--cinza-borda);
    padding: 0 1rem;
    height: 54px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-titulo {
    font-family: var(--fonte-display);
    font-size: 1.3rem;
    letter-spacing: 0.05em;
    color: var(--verde);
  }
  .header-titulo span { color: var(--amarelo); }

  .header-direita {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .header-usuario {
    font-family: var(--fonte-mono);
    font-size: 0.7rem;
    color: var(--texto-fraco);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .btn-header {
    background: var(--cinza-borda);
    border: 1px solid #333;
    border-radius: 6px;
    padding: 5px 10px;
    font-family: var(--fonte-mono);
    font-size: 0.68rem;
    color: var(--texto);
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: all 0.15s;
  }
  .btn-header:hover { border-color: var(--verde); color: var(--verde); }
  .btn-header.admin-btn { border-color: var(--amarelo); color: var(--amarelo); }
  .btn-header.admin-btn:hover { background: var(--amarelo); color: var(--preto); }

  /* Nav abas */
  .nav-dias {
    background: var(--cinza-escuro);
    border-bottom: 1px solid var(--cinza-borda);
    display: flex;
    overflow-x: auto;
    scrollbar-width: none;
    padding: 0 0.5rem;
    gap: 2px;
  }
  .nav-dias::-webkit-scrollbar { display: none; }

  .aba-dia {
    flex-shrink: 0;
    padding: 8px 12px;
    font-family: var(--fonte-mono);
    font-size: 0.68rem;
    color: var(--texto-fraco);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
    white-space: nowrap;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    user-select: none;
  }
  .aba-dia:hover { color: var(--texto); }
  .aba-dia.ativa {
    color: var(--verde);
    border-bottom-color: var(--verde);
  }
  .aba-dia.hoje { color: var(--amarelo); }
  .aba-dia.hoje.ativa { border-bottom-color: var(--amarelo); }

  /* Conteúdo */
  .conteudo {
    flex: 1;
    padding: 1rem;
    max-width: 680px;
    margin: 0 auto;
    width: 100%;
  }

  /* Card de jogo */
  .card-jogo {
    background: var(--cinza-medio);
    border: 1px solid var(--cinza-borda);
    border-radius: 10px;
    margin-bottom: 10px;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .card-jogo:hover { border-color: #333; }

  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 12px;
    border-bottom: 1px solid var(--cinza-borda);
  }

  .card-meta {
    font-family: var(--fonte-mono);
    font-size: 0.65rem;
    color: var(--texto-fraco);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .card-meta .grupo-badge {
    background: var(--cinza-borda);
    border-radius: 4px;
    padding: 2px 6px;
    margin-right: 6px;
    color: var(--texto);
  }

  .card-status {
    font-family: var(--fonte-mono);
    font-size: 0.62rem;
    letter-spacing: 0.05em;
  }
  .card-status.aberto { color: var(--verde); }
  .card-status.fechado { color: var(--texto-fraco); }
  .card-status.em-breve { color: var(--amarelo); }

  .card-corpo {
    padding: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .time {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .time.visitante { flex-direction: row-reverse; }

  .bandeira {
    width: 32px;
    height: 22px;
    object-fit: cover;
    border-radius: 3px;
    flex-shrink: 0;
  }

  .time-nome {
    font-family: var(--fonte-corpo);
    font-size: 0.82rem;
    font-weight: 700;
    color: var(--texto);
    line-height: 1.2;
  }
  .time.visitante .time-nome { text-align: right; }

  .placar-area {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }

  .input-placar {
    width: 46px;
    height: 46px;
    background: var(--cinza-escuro);
    border: 1px solid var(--cinza-borda);
    border-radius: 8px;
    text-align: center;
    font-family: var(--fonte-display);
    font-size: 1.6rem;
    color: var(--texto);
    outline: none;
    transition: border-color 0.15s;
    -moz-appearance: textfield;
  }
  .input-placar::-webkit-outer-spin-button,
  .input-placar::-webkit-inner-spin-button { -webkit-appearance: none; }
  .input-placar:focus { border-color: var(--verde); }
  .input-placar:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }
  .input-placar.salvo { border-color: var(--verde); }

  .separador-x {
    font-family: var(--fonte-display);
    font-size: 1.1rem;
    color: var(--texto-fraco);
  }

  .resultado-real {
    font-family: var(--fonte-display);
    font-size: 1.8rem;
    color: var(--amarelo);
    letter-spacing: 0.05em;
    text-align: center;
  }

  /* Countdown */
  .countdown {
    padding: 4px 12px 8px;
    font-family: var(--fonte-mono);
    font-size: 0.65rem;
    color: var(--verde);
    letter-spacing: 0.06em;
  }
  .countdown.urgente { color: #ff6b00; animation: pulsar 1s infinite; }
  @keyframes pulsar { 0%,100%{opacity:1} 50%{opacity:0.5} }

  /* Pontuação no card */
  .card-pts {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding: 4px 12px 8px;
    gap: 6px;
  }
  .pts-badge {
    font-family: var(--fonte-mono);
    font-size: 0.7rem;
    background: var(--cinza-borda);
    border-radius: 4px;
    padding: 3px 8px;
    color: var(--texto-fraco);
  }
  .pts-badge.destaque { background: rgba(0,165,80,0.2); color: var(--verde); }
  .pts-badge.exato { background: rgba(255,215,0,0.15); color: var(--amarelo); }

  /* Palpites alheios */
  .palpites-toggle {
    width: 100%;
    background: none;
    border: none;
    border-top: 1px solid var(--cinza-borda);
    padding: 8px 12px;
    font-family: var(--fonte-mono);
    font-size: 0.65rem;
    color: var(--texto-fraco);
    cursor: pointer;
    text-align: left;
    letter-spacing: 0.06em;
    transition: color 0.15s;
  }
  .palpites-toggle:hover { color: var(--texto); }

  .palpites-lista {
    display: none;
    border-top: 1px solid var(--cinza-borda);
    padding: 8px 12px;
  }
  .palpites-lista.aberta { display: block; }

  .palpite-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 5px 0;
    border-bottom: 1px solid var(--cinza-borda);
    font-size: 0.78rem;
  }
  .palpite-item:last-child { border-bottom: none; }
  .palpite-nome { color: var(--texto); }
  .palpite-nome.eu { color: var(--amarelo); font-weight: 700; }
  .palpite-nome.eu::after { content: ' ✦'; }
  .palpite-placar {
    font-family: var(--fonte-mono);
    font-size: 0.75rem;
    color: var(--texto-fraco);
  }
  .palpite-pts {
    font-family: var(--fonte-mono);
    font-size: 0.7rem;
    min-width: 50px;
    text-align: right;
  }

  /* Botão salvar */
  .barra-salvar {
    position: sticky;
    bottom: 0;
    background: linear-gradient(to top, var(--preto) 60%, transparent);
    padding: 1rem;
    display: none;
  }
  .barra-salvar.visivel { display: block; }

  .btn-salvar {
    width: 100%;
    max-width: 680px;
    display: block;
    margin: 0 auto;
    background: var(--verde);
    color: white;
    border: none;
    border-radius: 10px;
    height: 52px;
    font-family: var(--fonte-display);
    font-size: 1.4rem;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-salvar:hover { background: #00c060; }
  .btn-salvar:disabled { background: #333; color: var(--texto-fraco); cursor: not-allowed; }

  /* Ranking */
  #tela-ranking { display: none; padding: 1rem; max-width: 680px; margin: 0 auto; }

  .ranking-titulo {
    font-family: var(--fonte-display);
    font-size: 1.8rem;
    color: var(--amarelo);
    letter-spacing: 0.05em;
    margin-bottom: 1rem;
  }

  .ranking-item {
    background: var(--cinza-medio);
    border: 1px solid var(--cinza-borda);
    border-radius: 8px;
    padding: 12px 16px;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 12px;
    transition: border-color 0.15s;
  }
  .ranking-item.eu { border-color: var(--amarelo); }
  .ranking-item:hover { border-color: #333; }

  .ranking-pos {
    font-family: var(--fonte-display);
    font-size: 1.4rem;
    color: var(--texto-fraco);
    width: 28px;
    text-align: center;
    flex-shrink: 0;
  }
  .ranking-pos.ouro { color: #ffd700; }
  .ranking-pos.prata { color: #c0c0c0; }
  .ranking-pos.bronze { color: #cd7f32; }

  .ranking-nome {
    flex: 1;
    font-weight: 700;
    font-size: 0.9rem;
  }
  .ranking-detalhe {
    font-family: var(--fonte-mono);
    font-size: 0.62rem;
    color: var(--texto-fraco);
    margin-top: 2px;
  }

  .ranking-pts {
    font-family: var(--fonte-display);
    font-size: 1.5rem;
    color: var(--verde);
    letter-spacing: 0.03em;
  }

  /* Admin */
  #tela-admin {
    display: none;
    padding: 1rem;
    max-width: 680px;
    margin: 0 auto;
  }

  .admin-titulo {
    font-family: var(--fonte-display);
    font-size: 1.6rem;
    color: var(--amarelo);
    letter-spacing: 0.05em;
    margin-bottom: 1rem;
  }

  .admin-form {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-bottom: 6px;
  }
  .admin-form select, .admin-form input {
    background: var(--cinza-escuro);
    border: 1px solid var(--cinza-borda);
    border-radius: 6px;
    padding: 8px 10px;
    color: var(--texto);
    font-family: var(--fonte-mono);
    font-size: 0.8rem;
    outline: none;
  }
  .admin-form select { flex: 1; }
  .admin-form input { width: 52px; text-align: center; }
  .admin-form button {
    background: var(--amarelo);
    color: var(--preto);
    border: none;
    border-radius: 6px;
    padding: 8px 14px;
    font-family: var(--fonte-display);
    font-size: 1rem;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: opacity 0.15s;
  }
  .admin-form button:hover { opacity: 0.85; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--cinza-medio);
    border: 1px solid var(--cinza-borda);
    border-radius: 8px;
    padding: 10px 20px;
    font-family: var(--fonte-mono);
    font-size: 0.75rem;
    letter-spacing: 0.05em;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    z-index: 999;
    white-space: nowrap;
  }
  .toast.ok { border-color: var(--verde); color: var(--verde); }
  .toast.erro { border-color: #ff4444; color: #ff4444; }
  .toast.visivel { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Loading */
  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 3rem;
    font-family: var(--fonte-mono);
    font-size: 0.75rem;
    color: var(--texto-fraco);
    letter-spacing: 0.1em;
  }
  .loading::after {
    content: '';
    width: 16px;
    height: 16px;
    border: 2px solid var(--cinza-borda);
    border-top-color: var(--verde);
    border-radius: 50%;
    margin-left: 10px;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Nav bottom */
  .nav-bottom {
    background: var(--cinza-escuro);
    border-top: 1px solid var(--cinza-borda);
    display: flex;
    position: sticky;
    bottom: 0;
    z-index: 100;
  }

  .nav-btn {
    flex: 1;
    padding: 10px 0;
    background: none;
    border: none;
    font-family: var(--fonte-mono);
    font-size: 0.62rem;
    color: var(--texto-fraco);
    cursor: pointer;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    transition: color 0.15s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
  }
  .nav-btn .icone { font-size: 1.1rem; }
  .nav-btn:hover { color: var(--texto); }
  .nav-btn.ativo { color: var(--verde); }

  @media (max-width: 480px) {
    .time-nome { font-size: 0.72rem; }
    .input-placar { width: 40px; height: 40px; font-size: 1.3rem; }
    .bandeira { width: 26px; height: 18px; }
  }

  /* ── ESPECIAIS ── */
  #tela-especiais { display: none; padding: 1rem; max-width: 680px; margin: 0 auto; width: 100%; }
  .especiais-titulo { font-family: var(--fonte-display); font-size: 1.6rem; color: var(--amarelo); letter-spacing: 0.05em; margin-bottom: 0.3rem; }
  .especiais-sub { font-family: var(--fonte-mono); font-size: 0.65rem; color: var(--texto-fraco); letter-spacing: 0.08em; margin-bottom: 1.2rem; }
  .especiais-secao { font-family: var(--fonte-display); font-size: 1.1rem; color: var(--verde); letter-spacing: 0.06em; margin: 1.2rem 0 0.4rem; }
  .especiais-secao-sub { font-family: var(--fonte-mono); font-size: 0.62rem; color: var(--texto-fraco); letter-spacing: 0.08em; margin-bottom: 0.8rem; }
  .grid-times-esp { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 1.2rem; }
  @media(max-width: 480px) { .grid-times-esp { grid-template-columns: repeat(2, 1fr); } }
  .card-time-esp { background: var(--cinza-medio); border: 2px solid var(--cinza-borda); border-radius: 10px; padding: 12px 6px; display: flex; flex-direction: column; align-items: center; gap: 6px; cursor: pointer; transition: all 0.15s; }
  .card-time-esp:hover { border-color: #444; }
  .card-time-esp.selecionado { border-color: var(--amarelo); background: rgba(255,215,0,0.06); }
  .card-time-esp img { width: 44px; height: 30px; object-fit: cover; border-radius: 3px; }
  .card-time-esp-nome { font-family: var(--fonte-corpo); font-size: 0.68rem; font-weight: 700; text-align: center; color: var(--texto); line-height: 1.2; }
  .grid-jogadores-esp { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 1.2rem; }
  @media(max-width: 480px) { .grid-jogadores-esp { grid-template-columns: repeat(2, 1fr); } }
  .card-jogador-esp { background: var(--cinza-medio); border: 2px solid var(--cinza-borda); border-radius: 10px; cursor: pointer; transition: all 0.15s; padding: 14px 8px; text-align: center; }
  .card-jogador-esp:hover { border-color: #444; }
  .card-jogador-esp.selecionado { border-color: var(--verde); background: rgba(0,165,80,0.06); }

async function api(action, params) {
  const body = { action, user_id: usuario?.id, pin: usuario?.pin, ...params };
  const r = await fetch(API_URL, {
    method: 'POST',
    body: JSON.stringify(body),
    headers: { 'Content-Type': 'text/plain' }
  });
  return r.json();
}

// ══════════════════════════════════════════
// LOGIN
// ══════════════════════════════════════════
let pinAtual = '';

document.querySelectorAll('.tecla').forEach(t => {
  t.addEventListener('click', () => {
    const n = t.dataset.n;
    t.classList.add('pressed');
    setTimeout(() => t.classList.remove('pressed'), 120);
    if (n === 'del') {
      pinAtual = pinAtual.slice(0, -1);
    } else if (pinAtual.length < 4) {
      pinAtual += n;
    }
    atualizarDots();
  });
});

function atualizarDots() {
  for (let i = 0; i < 4; i++) {
    document.getElementById('dot' + i).classList.toggle('ativo', i < pinAtual.length);
  }
}

document.getElementById('btn-entrar').addEventListener('click', fazerLogin);

async function fazerLogin() {
  const id = document.getElementById('campo-id').value.trim();
  const erro = document.getElementById('login-erro');
  if (!id) { erro.textContent = 'Informe seu número de participante'; return; }
  if (pinAtual.length !== 4) { erro.textContent = 'Digite os 4 dígitos do PIN'; return; }
  erro.textContent = '';
  document.getElementById('btn-entrar').textContent = 'ENTRANDO...';
  try {
    const r = await fetch(API_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'login', user_id: id, pin: pinAtual }),
      headers: { 'Content-Type': 'text/plain' }
    });
    const data = await r.json();
    if (data.ok) {
      usuario = { id: data.id, nome: data.nome, admin: data.admin, pin: pinAtual };
      localStorage.setItem('bolao_usuario', JSON.stringify(usuario));
      entrar();
    } else {
      erro.textContent = 'ID ou PIN incorreto. Tente novamente.';
      pinAtual = '';
      atualizarDots();
    }
  } catch(e) {
    erro.textContent = 'Erro de conexão. Tente novamente.';
  }
  document.getElementById('btn-entrar').textContent = 'ENTRAR';
}

async function entrar() {
  document.getElementById('tela-login').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('header-nome').textContent = usuario.nome;
  if (usuario.admin) {
    document.getElementById('nav-admin-btn').style.display = 'flex';
  }
  // Carrega dados iniciais
  await Promise.all([carregarPalpites(), carregarResultados()]);
  construirNavDias();
  // Vai para o dia mais próximo com jogos
  const hoje = new Date();
  let melhorDia = 0;
  DAYS.forEach((d, i) => {
    if (new Date(d.date + 'T12:00:00-03:00') <= hoje) melhorDia = i;
  });
  irParaDia(melhorDia);
}

async function carregarPalpites() {
  const r = await api('buscar_palpites');
  if (r.ok) {
    meusPalpites = {};
    r.palpites.forEach(p => { meusPalpites[p.jogo_id] = { h: p.h, a: p.a }; });
  }
}

async function carregarResultados() {
  const r = await api('buscar_resultados');
  if (r.ok) {
    resultados = {};
    r.resultados.forEach(res => { resultados[res.jogo_id] = { h: res.h, a: res.a }; });
  }
}

async function carregarPalpitesJogo(jogo) {
  if (palpitesAlheios[jogo.id]) return palpitesAlheios[jogo.id];
  const r = await api('buscar_palpites_jogo', { jogo_id: jogo.id, kickoff: jogo.ko });
  if (r.ok) { palpitesAlheios[jogo.id] = r.palpites; return r.palpites; }
  return [];
}

function construirNavDias() {
  const nav = document.getElementById('nav-dias');
  const hoje = new Date();
  nav.innerHTML = '';
  DAYS.forEach((d, i) => {
    const dt = new Date(d.date + 'T12:00:00-03:00');
    const ehHoje = dt.toDateString() === hoje.toDateString();
    const aba = document.createElement('div');
    aba.className = 'aba-dia' + (ehHoje ? ' hoje' : '');
    aba.dataset.i = i;
    const dia = dt.getDate();
    const mes = dt.toLocaleDateString('pt-BR', { month: 'short' }).replace('.','');
    aba.textContent = `${dia} ${mes}`;
    if (ehHoje) aba.textContent += ' ●';
    aba.addEventListener('click', () => irParaDia(i));
    nav.appendChild(aba);
  });
}

function irParaDia(i) {
  diaAtivo = i;
  document.querySelectorAll('.aba-dia').forEach((a, j) => {
    a.classList.toggle('ativa', j === i);
  });
  // scroll para aba visível
  const abas = document.querySelectorAll('.aba-dia');
  if (abas[i]) abas[i].scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
  renderizarDia(i);
  mostrarTela('jogos');
}

function mostrarTela(tela) {
  telAativa = tela;
  document.getElementById('tela-jogos').style.display = tela === 'jogos' ? 'block' : 'none';
  document.getElementById('tela-ranking').style.display = tela === 'ranking' ? 'block' : 'none';
  document.getElementById('tela-especiais').style.display = tela === 'especiais' ? 'block' : 'none';
  document.getElementById('tela-admin').style.display = tela === 'admin' ? 'block' : 'none';
  document.getElementById('nav-jogos').classList.toggle('ativo', tela === 'jogos');
  document.getElementById('nav-ranking').classList.toggle('ativo', tela === 'ranking');
  document.getElementById('nav-especiais').classList.toggle('ativo', tela === 'especiais');
  document.getElementById('nav-admin-btn').classList.toggle('ativo', tela === 'admin');
  if (tela === 'ranking') carregarRanking();
  if (tela === 'admin') renderizarAdmin();
  if (tela === 'especiais') renderizarEspeciais();
}

function renderizarDia(i) {
  const dia = DAYS[i];
  const lista = document.getElementById('lista-jogos');
  // Limpar timers antigos
  Object.values(countdownTimers).forEach(clearInterval);
  countdownTimers = {};
  lista.innerHTML = '';
  palpitesModificados.clear();
  atualizarBarraSalvar();

  dia.matches.forEach(jogo => {
    const card = criarCardJogo(jogo);
    lista.appendChild(card);
  });
}

function criarCardJogo(jogo) {
  const agora = new Date();
  const ko = new Date(jogo.ko);
  const janela = new Date(ko.getTime() - 72 * 3600 * 1000);
  const encerrado = agora >= ko;
  const aberto = agora >= janela && agora < ko;
  const emBreve = agora < janela;
  const res = resultados[jogo.id];
  const meu = meusPalpites[jogo.id];

  const card = document.createElement('div');
  card.className = 'card-jogo';
  card.id = 'card-' + jogo.id;

  // Header
  let statusHtml = '';
  if (encerrado) statusHtml = `<span class="card-status fechado">🔒 encerrado</span>`;
  else if (aberto) statusHtml = `<span class="card-status aberto">✓ aberto</span>`;
  else statusHtml = `<span class="card-status em-breve">⏳ em breve</span>`;

  card.innerHTML = `
    <div class="card-header">
      <div class="card-meta">
        <span class="grupo-badge">G.${jogo.g}</span>
        ${jogo.id} · ${jogo.time}
      </div>
      ${statusHtml}
    </div>
    <div class="card-corpo">
      <div class="time casa">
        <img class="bandeira" src="${flagUrl(jogo.h)}" alt="${jogo.h}" onerror="this.style.opacity=0.3">
        <div class="time-nome">${jogo.h}</div>
      </div>
      <div class="placar-area" id="placar-${jogo.id}">
        ${renderizarPlacarArea(jogo, encerrado, aberto, meu, res)}
      </div>
      <div class="time visitante">
        <img class="bandeira" src="${flagUrl(jogo.a)}" alt="${jogo.a}" onerror="this.style.opacity=0.3">
        <div class="time-nome">${jogo.a}</div>
      </div>
    </div>
  `;

  // Pontuação se encerrado e tem palpite
  if (encerrado && meu && res) {
    const pts = calcPoints(meu.h, meu.a, res.h, res.a);
    const peso = pesoDoJogo(jogo.ko);
    const ptsFinal = pts * peso;
    let cls = pts === 25 ? 'exato' : pts >= 12 ? 'destaque' : '';
    const ptsBadge = document.createElement('div');
    ptsBadge.className = 'card-pts';
    ptsBadge.innerHTML = `
      <span class="pts-badge">palpite: ${meu.h}×${meu.a}</span>
      <span class="pts-badge ${cls}">${ptsFinal} pts</span>
    `;
    card.appendChild(ptsBadge);
  }

  // Countdown
  if (aberto) {
    const cdDiv = document.createElement('div');
    cdDiv.className = 'countdown';
    cdDiv.id = 'cd-' + jogo.id;
    card.appendChild(cdDiv);
    iniciarCountdown(jogo.id, ko, cdDiv);
  }

  // Palpites alheios (jogo encerrado)
  if (encerrado) {
    const toggle = document.createElement('button');
    toggle.className = 'palpites-toggle';
    toggle.textContent = '▼ ver palpites';
    toggle.id = 'toggle-' + jogo.id;
    const lista = document.createElement('div');
    lista.className = 'palpites-lista';
    lista.id = 'plist-' + jogo.id;
    toggle.addEventListener('click', async () => {
      const aberta = lista.classList.contains('aberta');
      if (!aberta) {
        lista.innerHTML = '<div style="font-size:0.7rem;color:#666;padding:4px 0">Carregando...</div>';
        lista.classList.add('aberta');
        toggle.textContent = '▲ fechar palpites';
        const pals = await carregarPalpitesJogo(jogo);
        renderizarPalpitesLista(lista, pals, jogo);
      } else {
        lista.classList.remove('aberta');
        toggle.textContent = '▼ ver palpites (' + (palpitesAlheios[jogo.id]?.length || '') + ')';
      }
    });
    card.appendChild(toggle);
    card.appendChild(lista);
  }

  // Listener nos inputs
  card.querySelectorAll('.input-placar').forEach(inp => {
    inp.addEventListener('change', () => {
      palpitesModificados.add(jogo.id);
      atualizarBarraSalvar();
    });
    inp.addEventListener('input', () => {
      let v = parseInt(inp.value);
      if (isNaN(v) || v < 0) inp.value = '';
      if (v > 99) inp.value = 99;
    });
  });

  return card;
}

function renderizarPlacarArea(jogo, encerrado, aberto, meu, res) {
  if (res) {
    return `<div class="resultado-real">${res.h} × ${res.a}</div>`;
  }
  const disabled = (!aberto && !encerrado) || encerrado ? 'disabled' : '';
  const vh = meu ? meu.h : '';
  const va = meu ? meu.a : '';
  const cls = meu ? 'salvo' : '';
  return `
    <input type="number" class="input-placar ${cls}" id="ph-${jogo.id}" value="${vh}" min="0" max="99" ${disabled} placeholder="–">
    <span class="separador-x">×</span>
    <input type="number" class="input-placar ${cls}" id="pa-${jogo.id}" value="${va}" min="0" max="99" ${disabled} placeholder="–">
  `;
}

function renderizarPalpitesLista(lista, pals, jogo) {
  const res = resultados[jogo.id];
  if (!pals.length) {
    lista.innerHTML = '<div style="font-size:0.72rem;color:#555;padding:4px 0">Ninguém palpitou neste jogo.</div>';
    return;
  }
  lista.innerHTML = '';
  pals.forEach(p => {
    const eu = String(p.id) === String(usuario.id);
    const item = document.createElement('div');
    item.className = 'palpite-item';
    let ptsHtml = '';
    if (p.ptsFinal !== null && p.ptsFinal !== undefined) {
      ptsHtml = `<span class="palpite-pts" style="color:${p.pts>=25?'#ffd700':p.pts>=12?'#00a550':'#666'}">${p.ptsFinal} pts</span>`;
    }
    item.innerHTML = `
      <span class="palpite-nome ${eu?'eu':''}">${p.nome}</span>
      <span class="palpite-placar">${p.h} × ${p.a}</span>
      ${ptsHtml}
    `;
    lista.appendChild(item);
  });
}

// ══════════════════════════════════════════
// COUNTDOWN
// ══════════════════════════════════════════
function iniciarCountdown(id, ko, el) {
  function tick() {
    const diff = ko - new Date();
    if (diff <= 0) { el.textContent = ''; clearInterval(countdownTimers[id]); return; }
    const h = Math.floor(diff / 3600000);
    const m = Math.floor((diff % 3600000) / 60000);
    const s = Math.floor((diff % 60000) / 1000);
    el.textContent = `⏱ fecha em ${h}h ${String(m).padStart(2,'0')}m ${String(s).padStart(2,'0')}s`;
    el.classList.toggle('urgente', h < 1);
  }
  tick();
  countdownTimers[id] = setInterval(tick, 1000);
}

function atualizarBarraSalvar() {

  barra.classList.toggle('visivel', palpitesModificados.size > 0);

document.getElementById('btn-salvar-dia').addEventListener('click', async () => {
  const btn = document.getElementById('btn-salvar-dia');
  btn.disabled = true;
  btn.textContent = 'SALVANDO...';
  const ids = [...palpitesModificados];
  let ok = 0, fail = 0;
  for (const jogo_id of ids) {
    const ph = document.getElementById('ph-' + jogo_id);
    const pa = document.getElementById('pa-' + jogo_id);
    if (!ph || !pa) continue;
    const h = ph.value;
    const a = pa.value;
    if (h === '' || a === '') continue;
    const jogoObj = DAYS.flatMap(d => d.matches).find(j => j.id === jogo_id);
const r = await api('salvar_palpite', { jogo_id, h: Number(h), a: Number(a), kickoff: jogoObj.ko });
    if (r.ok) {
      ok++;
      meusPalpites[jogo_id] = { h: Number(h), a: Number(a) };
      ph.classList.add('salvo'); pa.classList.add('salvo');
    } else { fail++; }
  }
  palpitesModificados.clear();
  atualizarBarraSalvar();
  btn.disabled = false;
  btn.textContent = 'SALVAR PALPITES';
  if (ok > 0) toast(`${ok} palpite${ok>1?'s':''} salvo${ok>1?'s':''}!`, 'ok');
  if (fail > 0) toast(`${fail} erro(s) ao salvar.`, 'erro');
});

async function carregarRanking() {
  document.getElementById('lista-ranking').innerHTML = '<div class="loading">CARREGANDO</div>';
  const jogos = DAYS.flatMap(d => d.matches).map(j => ({ id: j.id, ko: j.ko }));
  const r = await api('buscar_ranking', { jogos });
  if (!r.ok) { document.getElementById('lista-ranking').innerHTML = '<div class="loading">Erro ao carregar.</div>'; return; }
  const div = document.getElementById('lista-ranking');
  div.innerHTML = '';
  r.ranking.forEach((p, i) => {
    const item = document.createElement('div');
    item.className = 'ranking-item' + (String(p.id) === String(usuario.id) ? ' eu' : '');
    const posClasses = ['','ouro','prata','bronze'];
    const posClass = posClasses[i+1] || '';
    const medalhas = ['','🥇','🥈','🥉'];
    item.innerHTML = `
      <div class="ranking-pos ${posClass}">${medalhas[i+1] || (i+1)}</div>

      </div>
      <div class="ranking-pts">${p.pontos.toLocaleString('pt-BR')}</div>
    `;
    div.appendChild(item);
  });
}

        </select>
        <input type="number" id="adm-h-${jogo.id}" placeholder="${res?res.h:'H'}" value="${res?res.h:''}" min="0" max="99">
        <span style="color:#555;font-family:var(--fonte-mono)">×</span>
        <input type="number" id="adm-a-${jogo.id}" placeholder="${res?res.a:'A'}" value="${res?res.a:''}" min="0" max="99">
        <button onclick="salvarResultado('${jogo.id}')">OK</button>
      `;
      area.appendChild(row);
    });
  });
}

async function salvarResultado(jogo_id) {
  const h = document.getElementById('adm-h-' + jogo_id).value;
  const a = document.getElementById('adm-a-' + jogo_id).value;
  if (h === '' || a === '') { toast('Informe os dois placares', 'erro'); return; }
  const r = await api('salvar_resultado', { jogo_id, h: Number(h), a: Number(a) });
  if (r.ok) {
    resultados[jogo_id] = { h: Number(h), a: Number(a) };
    toast(`Resultado ${jogo_id} salvo: ${h}×${a}`, 'ok');
  } else {
    toast('Erro ao salvar', 'erro');
  }
}

// ══════════════════════════════════════════
// ENGINE DE PONTUAÇÃO (cliente)
// ══════════════════════════════════════════
function calcPoints(gh, ga, rh, ra) {
  gh=Number(gh);ga=Number(ga);rh=Number(rh);ra=Number(ra);
  if(gh===rh&&ga===ra)return 25;
  const gW=gh>ga?'h':ga>gh?'a':'d';
  const rW=rh>ra?'h':ra>rh?'a':'d';
  if(gW==='d'&&rW==='d')return 15;
  if(gW==='d'&&rW!=='d')return 4;
  if(gW!==rW)return 0;
  if(gW==='h'&&gh===rh)return 18;
  if(gW==='a'&&ga===ra)return 18;
  if(Math.abs(gh-ga)===Math.abs(rh-ra))return 15;
  return 12;
}

function pesoDoJogo(ko) {
  const inicio = new Date('2026-06-11T00:00:00-03:00');
  const d = new Date(ko);
  return 10 + Math.round((d - inicio) / 86400000);
}

let toastTimer = null;
function toast(msg, tipo) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast ' + tipo + ' visivel';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('visivel'), 3000);
}


// ══════════════════════════════════════════
// ESPECIAIS — FUNÇÕES
// ══════════════════════════════════════════
async function renderizarEspeciais() {
  const div = document.getElementById('especiais-conteudo');
  div.innerHTML = '<div class="loading">CARREGANDO</div>';

  const rPalpite = await api('buscar_especial');
  if (rPalpite.ok && rPalpite.palpite) {
    campeaoEsp = rPalpite.palpite.campeao || null;
    artilheiroEsp = rPalpite.palpite.artilheiro || null;
  }

  div.innerHTML = '';
  const fechado = new Date() >= FECHAMENTO_ESPECIAIS;

  // Contador regressivo
  if (!fechado) {
    const cdDiv = document.createElement('div');
    cdDiv.id = 'esp-countdown';
    cdDiv.style.cssText = 'font-family:var(--fonte-mono);font-size:0.72rem;color:var(--amarelo);letter-spacing:0.06em;margin-bottom:1rem;text-align:center;padding:8px;background:rgba(255,215,0,0.06);border-radius:8px;';
    div.appendChild(cdDiv);
    const tick = () => {
      const diff = FECHAMENTO_ESPECIAIS - new Date();
      if (diff <= 0) { cdDiv.textContent = '🔒 Apostas encerradas'; return; }
      const h = Math.floor(diff / 3600000);
      const m = Math.floor((diff % 3600000) / 60000);
      const s = Math.floor((diff % 60000) / 1000);
      cdDiv.textContent = `⏱ Fecha em ${h}h ${String(m).padStart(2,'0')}m ${String(s).padStart(2,'0')}s`;
    };
    tick();
    setInterval(tick, 1000);
  }

  // Depois do fechamento: mostra palpites de todos automaticamente
  if (fechado) {
    await renderizarRevelacaoEsp(div);
    return;
  }

  // Resumo atual
  if (campeaoEsp || artilheiroEsp) {
    const resumo = document.createElement('div');
    resumo.className = 'especiais-resumo';
    resumo.innerHTML = `
      <div class="especiais-resumo-item"><div class="especiais-resumo-label">Campeão escolhido</div><div class="especiais-resumo-valor" id="esp-res-campeao">${campeaoEsp || '—'}</div></div>
      <div class="especiais-resumo-divider"></div>
      <div class="especiais-resumo-item"><div class="especiais-resumo-label">Artilheiro escolhido</div><div class="especiais-resumo-valor" id="esp-res-artilheiro">${artilheiroEsp || '—'}</div></div>`;
    div.appendChild(resumo);
  }

  // Times
  const secT = document.createElement('div');
  secT.innerHTML = `<div class="especiais-secao">🏆 Campeão da Copa</div><div class="especiais-secao-sub">VALE 1.000 PONTOS · ESCOLHA UMA SELEÇÃO</div>`;
  div.appendChild(secT);

  const gridT = document.createElement('div');
  gridT.className = 'grid-times-esp';
  TIMES_QUARTAS.forEach(time => {
    const card = document.createElement('div');
    card.className = 'card-time-esp' + (campeaoEsp === time.nome ? ' selecionado' : '');
    card.innerHTML = `<img src="https://flagcdn.com/w80/${time.flag}.png" alt="${time.nome}" onerror="this.style.opacity=0.3"><span class="card-time-esp-nome">${time.nome}</span>`;
    card.addEventListener('click', () => {
      campeaoEsp = time.nome;
      document.querySelectorAll('.card-time-esp').forEach(c => c.classList.remove('selecionado'));
      card.classList.add('selecionado');
      const el = document.getElementById('esp-res-campeao');
      if (el) el.textContent = campeaoEsp;
    });
    gridT.appendChild(card);
  });
  div.appendChild(gridT);

  // Artilheiros
  const secA = document.createElement('div');
  secA.innerHTML = `<div class="especiais-secao">⚽ Artilheiro da Copa</div><div class="especiais-secao-sub">VALE 1.000 PONTOS · ESCOLHA UM JOGADOR</div>`;
  div.appendChild(secA);

  const gridA = document.createElement('div');
  gridA.className = 'grid-jogadores-esp';
  ARTILHEIROS_ESP.forEach(jog => {
    const card = document.createElement('div');
    card.className = 'card-jogador-esp' + (artilheiroEsp === jog.nome ? ' selecionado' : '');
    card.innerHTML = `
      <img src="https://flagcdn.com/w80/${jog.flag}.png" alt="${jog.pais}" onerror="this.style.opacity=0.3">
      <div class="card-jogador-esp-nome">${jog.nome}</div>
      <div class="card-jogador-esp-pais">${jog.pais}</div>`;
    card.addEventListener('click', () => {
      artilheiroEsp = jog.nome;
      document.querySelectorAll('.card-jogador-esp').forEach(c => c.classList.remove('selecionado'));
      card.classList.add('selecionado');
      const el = document.getElementById('esp-res-artilheiro');
      if (el) el.textContent = artilheiroEsp;
    });
    gridA.appendChild(card);
  });
  div.appendChild(gridA);

  const btn = document.createElement('button');
  btn.className = 'btn-salvar-esp';
  btn.id = 'btn-salvar-esp';
  btn.textContent = 'SALVAR PALPITES ESPECIAIS';
  btn.addEventListener('click', salvarEspecial);
  div.appendChild(btn);
}

async function salvarEspecial() {
  if (!campeaoEsp || !artilheiroEsp) { toast('Escolha campeão e artilheiro!', 'erro'); return; }
  const btn = document.getElementById('btn-salvar-esp');
  btn.disabled = true; btn.textContent = 'SALVANDO...';
  const r = await api('salvar_especial', { campeao: campeaoEsp, artilheiro: artilheiroEsp });
  btn.disabled = false; btn.textContent = 'SALVAR PALPITES ESPECIAIS';
  if (r.ok) toast('Palpites especiais salvos!', 'ok');
  else toast('Erro ao salvar', 'erro');
}

async function revelarEspeciais() {
  const r = await api('revelar_especiais');
  if (r.ok) {
    especialRevelado = true;
    renderizarEspeciais();
    toast('Palpites revelados para todos!', 'ok');
  } else {
    toast(r.erro || 'Erro ao revelar', 'erro');
  }
}

async function renderizarRevelacaoEsp(div) {
  if (!todosEspeciais.length) {
    const r = await api('buscar_todos_especiais');
    if (r.ok) todosEspeciais = r.palpites;
  }
  const titulo = document.createElement('div');
  titulo.className = 'especiais-secao';
  titulo.style.marginTop = '0';
  titulo.textContent = '🏆 Palpites de Todos';
  div.appendChild(titulo);
  todosEspeciais.forEach(p => {
    const eu = String(p.id) === String(usuario.id);
    const item = document.createElement('div');
    item.className = 'especiais-rev-item';
    item.innerHTML = `
      <span class="especiais-rev-nome ${eu?'eu':''}">${p.nome}</span>
      <span class="especiais-rev-palpite">🏆 ${p.campeao || '—'}<br>⚽ ${p.artilheiro || '—'}</span>`;
    div.appendChild(item);
  });
}
